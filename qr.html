<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>琉球の風 2026 入場QRコード</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #f1f5f9; padding: 20px 10px; color: #1e293b; }
    .container { max-width: 450px; margin: 0 auto; }
    .qr-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h1 { font-size: 1.2rem; margin-bottom: 10px; color: #1e3a8a; }
    .ticket-label { font-size: 0.8rem; font-weight: bold; background: #1e3a8a; color: white; padding: 4px 12px; border-radius: 50px; display: inline-block; margin-bottom: 10px; }
    .qr-image { margin: 10px 0; border: 4px solid #fff; width: 200px; height: 200px; }
    .info { font-size: 0.85rem; margin-top: 10px; text-align: left; background: #f8fafc; padding: 12px; border-radius: 10px; }
    .warning { font-size: 0.8rem; color: #ef4444; margin: 20px 0; font-weight: bold; }
    #loading { padding: 50px; font-weight: bold; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>琉球の風 2026<br>入場用QRコード</h1>
    
    <div id="loading">チケット情報を確認中...</div>
    <div id="qr-list"></div> <p class="warning">※当日、受付にてこの画面をご提示ください。<br>複数枚ある場合は、スクロールしてすべてお見せください。</p>
  </div>

  <script>
    // 🌟 サーバー(GAS)のURLをここに貼り付けてください
    const url = "https://script.google.com/macros/s/AKfycbztnrb9di5cdMmJ8tj2uezPt1DrDNylHClreNxQ44ZZ41FVPjYlL6RHtOUs13Njlly-5A/exec";

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    async function loadTickets() {
      if (!id) {
        document.getElementById('loading').innerText = 'エラー: IDが見つかりません';
        return;
      }

      try {
        // 🌟 GASから特定の注文データを取得
        const response = await fetch(`${url}?type=getOrder&id=${id}`);
        const order = await response.json();

        if (!order || order.error) {
          document.getElementById('loading').innerText = 'エラー: 注文情報が見つかりません';
          return;
        }

        document.getElementById('loading').style.display = 'none';
        const qrList = document.getElementById('qr-list');

        // 🌟 合計枚数を算出
        const total = (Number(order.s_a)||0) + (Number(order.s_c)||0) + (Number(order.g_a)||0) + (Number(order.g_c)||0);

        // 🌟 枚数分ループしてQRカードを生成
        for (let i = 1; i <= total; i++) {
          const branchId = `${order.id}-${i}`; // 枝番（ID-1, ID-2...）
          const card = document.createElement('div');
          card.className = 'qr-card';
          card.innerHTML = `
            <div class="ticket-label">チケット ${i} / ${total}</div>
            <div>
              <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${branchId}" alt="QR">
            </div>
            <div class="info">
              <strong>お名前:</strong> ${order.name} 様<br>
              <strong>受付番号:</strong> ${branchId}
            </div>
          `;
          qrList.appendChild(card);
        }

      } catch (e) {
        console.error(e);
        document.getElementById('loading').innerText = 'エラー: 読み込みに失敗しました';
      }
    }

    loadTickets();
  </script>
</body>
</html>
