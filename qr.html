<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>琉球の風 2026 入場QRコード</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #f1f5f9; padding: 20px 10px; color: #1e293b; }
    .container { max-width: 450px; margin: 0 auto; }
    .qr-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h1 { font-size: 1.2rem; margin-bottom: 10px; color: #1e3a8a; }
    .ticket-label { font-size: 0.8rem; font-weight: bold; background: #1e3a8a; color: white; padding: 4px 12px; border-radius: 50px; display: inline-block; margin-bottom: 10px; }
    .qr-image { margin: 10px 0; border: 4px solid #fff; width: 200px; height: 200px; }
    .info { font-size: 0.85rem; margin-top: 10px; text-align: left; background: #f8fafc; padding: 12px; border-radius: 10px; }
    .warning { font-size: 0.8rem; color: #ef4444; margin: 20px 0; font-weight: bold; }
    #status-msg { padding: 50px; font-weight: bold; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>琉球の風 2026<br>入場用QRコード</h1>
    
    <div id="status-msg">チケット情報を読み込み中...</div>
    <div id="qr-list"></div>

    <p class="warning">※当日、受付にてこの画面をご提示ください。</p>
  </div>

  <script>
    // 🌟 重要：admin.jsの1行目にあるURLと「完全に同じもの」をここに貼ってください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzAn0H2IZggXHjnkrSAaupj9I1mezeY9KLbxlsXY7P4Uoxkg6yR_Kt2v2hg2C7zYJ5bZg/exec";

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    async function loadTickets() {
      const msgEl = document.getElementById('status-msg');
      
      if (!orderId) {
        msgEl.innerHTML = '<span style="color:red;">エラー: URLにID（?id=...）がありません</span>';
        return;
      }

      try {
        // 🌟 通信テスト
        const fetchUrl = `${GAS_URL}?type=getOrder&id=${orderId}`;
        console.log("アクセス中:", fetchUrl);
        
        const response = await fetch(fetchUrl);
        const order = await response.json();
        
        console.log("取得データ:", order);

        if (!order || order.error) {
          msgEl.innerHTML = `<span style="color:red;">エラー: 注文が見つかりません (ID: ${orderId})</span>`;
          return;
        }

        // 🌟 読み込み成功：表示処理
        msgEl.style.display = 'none';
        const qrList = document.getElementById('qr-list');

        // 枚数の計算（プロパティ名はスプレッドシートの1行目と一致させる必要があります）
        const s_a = Number(order.s_a) || 0;
        const s_c = Number(order.s_c) || 0;
        const g_a = Number(order.g_a) || 0;
        const g_c = Number(order.g_c) || 0;
        const total = s_a + s_c + g_a + g_c;

        if (total === 0) {
          msgEl.style.display = 'block';
          msgEl.innerText = "有効なチケット枚数が0枚です。";
          return;
        }

        for (let i = 1; i <= total; i++) {
          const branchId = `${order.id}-${i}`;
          const card = document.createElement('div');
          card.className = 'qr-card';
          card.innerHTML = `
            <div class="ticket-label">チケット ${i} / ${total}</div>
            <div>
              <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${branchId}" alt="QR">
            </div>
            <div class="info">
              <strong>お名前:</strong> ${order.name} 様<br>
              <strong>受付番号:</strong> ${branchId}
            </div>
          `;
          qrList.appendChild(card);
        }

      } catch (e) {
        console.error("読み込みエラー:", e);
        msgEl.innerHTML = `<span style="color:red;">通信エラーが発生しました。<br>理由: ${e.message}</span>`;
      }
    }

    loadTickets();
  </script>
</body>
</html>
