<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【受付用】QRチェックイン</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: #1a202c; color: white; margin: 0; padding: 20px; }
    #canvas { width: 100%; max-width: 400px; border: 4px solid #4a5568; border-radius: 15px; }
    .status-msg { margin-top: 20px; padding: 20px; border-radius: 12px; font-weight: bold; font-size: 1.4em; }
    .success { background: #2f855a; border: 4px solid #48bb78; }
    .error { background: #9b2c2c; border: 4px solid #f56565; }
    .loading { background: #4a5568; }
    #result-info { margin-top: 20px; text-align: left; background: #fff; color: #1a202c; padding: 20px; border-radius: 12px; display: none; }
    .ticket-box { border-top: 1px solid #e2e8f0; margin-top: 10px; padding-top: 10px; font-size: 1.5em; font-weight: bold; color: #2b6cb0; text-align: center; }
    button { margin-top:25px; padding:18px; width:100%; max-width:400px; font-size:20px; border-radius:15px; border:none; background:#3182ce; color:white; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>
  <h1>🎟️ 受付スキャン</h1>
  
  <canvas id="canvas" hidden></canvas>
  <div id="loadingMessage">🎥 カメラ起動中...</div>
  <div id="status" class="status-msg loading">待機中</div>

  <div id="result-info">
    <p id="res-id" style="color: #718096; font-size: 0.9em; margin: 0;"></p>
    <div class="ticket-box" id="res-ticket"></div>
  </div>

  <button onclick="resetScanner()">次の人をスキャン</button>

  <script>
    const video = document.createElement("video");
    const canvasElement = document.getElementById("canvas");
    const canvas = canvasElement.getContext("2d");
    const loadingMessage = document.getElementById("loadingMessage");
    const statusDiv = document.getElementById("status");
    const resultDiv = document.getElementById("result-info");
    
    // 🌟 GASのデプロイURLをここに貼ってください
    const url = "https://script.google.com/macros/s/AKfycbzAn0H2IZggXHjnkrSAaupj9I1mezeY9KLbxlsXY7P4Uoxkg6yR_Kt2v2hg2C7zYJ5bZg/exec";

    // 音源（ブラウザの標準機能で「ピィッ！」と鳴らします）
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, duration) {
      const v = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      v.connect(g); v.frequency.value = freq; v.type = "square";
      g.connect(audioCtx.destination); g.gain.value = 0.1;
      v.start(); setTimeout(()=>v.stop(), duration);
    }

    let isScanning = true;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      video.play();
      requestAnimationFrame(tick);
    });

    function tick() {
      if (!isScanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        loadingMessage.hidden = true;
        canvasElement.hidden = false;
        canvasElement.height = video.videoHeight;
        canvasElement.width = video.videoWidth;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
        const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

        if (code) {
          isScanning = false;
          checkIn(code.data);
          return;
        }
      }
      requestAnimationFrame(tick);
    }

    async function checkIn(qrData) {
      statusDiv.innerText = "🔄 照合中...";
      statusDiv.className = "status-msg loading";
      
      try {
        const res = await fetch(`${url}?type=checkin&id=${encodeURIComponent(qrData)}&t=${new Date().getTime()}`);
        const result = await res.json();

        if (result.status === "success") {
          beep(880, 150); // 成功音
          statusDiv.innerText = "✅ 入場OK";
          statusDiv.className = "status-msg success";
          resultDiv.style.display = "block";
          
          document.getElementById("res-id").innerText = "ID: " + result.id;
          const areaHtml = `<div style="font-size: 2em; color: #e53e3e; margin-bottom: 10px;">${result.areaInfo}</div>`;
          document.getElementById("res-ticket").innerHTML = areaHtml + result.ticket;

          // 🌟 3秒後に自動でスキャンを再開する
          setTimeout(() => {
            resetScanner();
          }, 3000); // 3000ミリ秒 = 3秒（確認時間を考慮して設定）

        } else {
          beep(200, 400); // 失敗音
          statusDiv.innerText = "❌ " + result.message;
          statusDiv.className = "status-msg error";
          resultDiv.style.display = "none";
          
          // 🌟 エラーの時も5秒後に自動復帰させる
          setTimeout(() => {
            resetScanner();
          }, 5000);
        }
      } catch (error) {
        beep(200, 400);
        statusDiv.innerText = "❌ 通信失敗";
        statusDiv.className = "status-msg error";
        
        setTimeout(() => {
          resetScanner();
        }, 5000);
      }
    }

    function resetScanner() {
      isScanning = true;
      statusDiv.innerText = "待機中";
      statusDiv.className = "status-msg loading";
      resultDiv.style.display = "none";
      requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
