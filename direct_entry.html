<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【ボランティア用】チケット登録</title>
  <style>
    body { font-family: sans-serif; padding: 15px; background: #f0f2f5; color: #333; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    h1 { font-size: 1.1em; color: #2b6cb0; text-align: center; margin-bottom: 20px; }
    label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.85em; }
    input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .price-notice { background: #fff5f5; color: #c53030; padding: 10px; border-radius: 5px; font-size: 0.8em; margin-top: 10px; font-weight: bold; text-align: center; }
    .total-display { margin-top: 20px; background: #fff9db; padding: 15px; border-radius: 10px; text-align: center; border: 2px solid #ffd43b; }
    #submit-btn { background: #3182ce; color: white; border: none; width: 100%; padding: 18px; margin-top: 20px; border-radius: 10px; font-weight: bold; font-size: 1.1em; cursor: pointer; }
    #submit-btn:disabled { background: #ccc; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title-text">🎫 チケット登録</h1>
    
    <div id="day-price-info" class="price-notice" style="display:none;">⚠️ 当日料金が適用されています</div>

    <div id="name-area">
      <label>お客様のお名前</label>
      <input type="text" id="cust-name" placeholder="山田 太郎">
    </div>

    <div class="grid">
      <div><label>Sエリア大人</label><input type="number" id="sa" value="0" min="0" oninput="calc()"></div>
      <div><label>Sエリア子供</label><input type="number" id="sc" value="0" min="0" oninput="calc()"></div>
      <div><label>一般大人</label><input type="number" id="ga" value="0" min="0" oninput="calc()"></div>
      <div><label>一般子供</label><input type="number" id="gc" value="0" min="0" oninput="calc()"></div>
    </div>

    <div id="status-area">
      <label>ステータス</label>
      <select id="status-select">
        <option value="完了">完了（入金済み・渡し済み）</option>
        <option value="オキチケ">オキチケ（入金済み）</option>
        <option value="未入金オキチケ">未入金オキチケ</option>
      </select>
    </div>

    <label>備考</label>
    <textarea id="remarks-input" rows="2" placeholder="メモなどあれば"></textarea>

    <div class="total-display">
      合計：<span id="total-price" style="font-size: 1.6em; color: #d53f8c;">0</span> 円
    </div>

    <button id="submit-btn" onclick="sendData()">登録する</button>
  </div>

  <script>
    const url = "https://script.google.com/macros/s/AKfycbzAn0H2IZggXHjnkrSAaupj9I1mezeY9KLbxlsXY7P4Uoxkg6yR_Kt2v2hg2C7zYJ5bZg/exec";
   // 🌟 PERFORMANCE_DATE を変数にする（最初は仮の値）
  let PERFORMANCE_DATE = new Date("2099-12-31"); 

  async function init() {
    try {
      const response = await fetch(`${url}?type=getConfig`);
      MASTER_PRICES = await response.json();
      
      // 🌟 スプレッドシートの B1 (event_date) を PERFORMANCE_DATE に反映
      if (MASTER_PRICES["event_date"]) {
        PERFORMANCE_DATE = new Date(MASTER_PRICES["event_date"]);
      }
    } catch (e) {
      console.error("設定取得失敗:", e);
    }

    // 🌟 判定処理（スプレッドシートの日付と比較）
    const isDayPrice = new Date() >= PERFORMANCE_DATE;
    
    if (isDayPrice) {
      document.getElementById("title-text").innerText = "🎫 当日券 販売フォーム";
      document.getElementById("day-price-info").style.display = "block";
      document.getElementById("name-area").classList.add("hidden");
      document.getElementById("status-area").classList.add("hidden");
    } else {
      document.getElementById("title-text").innerText = "🎫 事前手元販売 登録";
    }
    calc();
  }

    function calc() {
  const sa = Number(document.getElementById("sa").value) || 0;
  const sc = Number(document.getElementById("sc").value) || 0;
  const ga = Number(document.getElementById("ga").value) || 0;
  const gc = Number(document.getElementById("gc").value) || 0;

  const isDayPrice = new Date() >= PERFORMANCE_DATE;
  
  // 🌟 Mail.gsの読み込み形式(image_d4db40.jpg)に合わせ、A列の項目名で取得
  const add = isDayPrice ? (Number(MASTER_PRICES["door_ticket_fee"]) || 0) : 0;
  
  const priceSa = (Number(MASTER_PRICES["s_a_price"]) || 0) + (sa > 0 ? add : 0);
  const priceSc = (Number(MASTER_PRICES["s_c_price"]) || 0) + (sc > 0 ? add : 0);
  const priceGa = (Number(MASTER_PRICES["g_a_price"]) || 0) + (ga > 0 ? add : 0);
  const priceGc = (Number(MASTER_PRICES["g_c_price"]) || 0) + (gc > 0 ? add : 0);

  const total = (sa * priceSa) + (sc * priceSc) + (ga * priceGa) + (gc * priceGc);
  
  document.getElementById("total-price").innerText = total.toLocaleString();
}
    async function sendData() {
  // 🌟【重要】ここで画面のタイトルが「当日券」になっているかどうかで最終判定する
  // これが一番確実で、表示とデータの食い違いを防げます
  const isDoorTicketMode = document.getElementById("title-text").innerText.includes("当日券");

  let name = isDoorTicketMode ? "当日販売" : document.getElementById("cust-name").value;
  if(!name) return alert("お名前を入力してください");

  if(!confirm(name + " として登録しますか？")) return;

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.innerText = "登録中...";

  // 🌟 送信するデータの中身
  const payload = {
    type: "addDirectSale",
    name: name,
    s_a: document.getElementById("sa").value,
    s_c: document.getElementById("sc").value,
    g_a: document.getElementById("ga").value,
    g_c: document.getElementById("gc").value,
    total: document.getElementById("total-price").innerText.replace(/,/g, ''),
    shipping: "手渡し",
    
    // 🌟 ここ！ 画面が当日券なら「当日販売」、そうでなければ「直接販売」
    salesType: isDoorTicketMode ? "当日販売" : "直接販売", 
    
    remarks: document.getElementById("remarks-input").value,
    status: isDoorTicketMode ? "完了" : document.getElementById("status-select").value
  };

  try {
    const res = await fetch(url, { method: "POST", body: JSON.stringify(payload) });
    const result = await res.json();
    alert("登録完了！");
    location.reload();
  } catch (e) {
    alert("エラーが発生しました。");
    btn.disabled = false;
    btn.innerText = "登録する";
  }
}

    window.onload = init;
  </script>
  <div style="text-align: center; margin-top: 30px; margin-bottom: 50px;">
  <a href="admin.html" style="
      display: inline-block;
      padding: 12px 24px;
      background-color: #64748b; /* 落ち着いたグレー */
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  ">
    ⬅️ 管理画面に戻る
  </a>
</div>
</body>
</html>
